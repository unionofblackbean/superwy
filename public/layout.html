<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脏小豆 - 仓库坐标地图</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 100vw;
            height: 100vh;
            background-color: #1a1a1a;
            font-family: "PingFang SC","Microsoft YaHei",sans-serif;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100%;
            display: flex;
        }

        .layout-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .map-header {
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 20px;
            font-size: 14px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .header-right {
            display: flex;
            gap: 15px;
        }

        .refresh-btn {
            padding: 6px 16px;
            background: #409EFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #66B1FF;
        }

        .container-count {
            color: #909399;
            font-size: 12px;
        }

        .legend {
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 11px;
            color: #999;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 2px;
        }

        .map-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .map-section {
            flex: 1;
            position: relative;
            overflow: auto;
            background: #0a0a0a;
            border-right: 1px solid #2a2a2a;
        }

        .map-section:last-child {
            border-right: none;
        }

        .section-title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #666;
            font-size: 11px;
            pointer-events: none;
            z-index: 1;
        }

        .map-canvas {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .container-item {
            position: absolute;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid rgba(64, 158, 255, 0.3);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.5);
        }

        .container-item:hover {
            transform: scale(1.3);
            border-color: #409EFF;
            background: rgba(64, 158, 255, 0.2);
            box-shadow: 0 0 12px rgba(64, 158, 255, 0.6);
        }

        .item-icon {
            width: 32px;
            height: 32px;
            image-rendering: pixelated;
            object-fit: contain;
        }

        .tooltip-box {
            position: fixed;
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 1000;
            border: 1px solid #409EFF;
            white-space: nowrap;
            display: none;
        }

        .tooltip-box.show {
            display: block;
        }

        .empty-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <script>
        (function () {
            const ACCESS_PASSWORD = 'pzmf1234';
            const AUTH_KEY = 'superwy_frontend_authed';

            if (sessionStorage.getItem(AUTH_KEY) === '1') {
                return;
            }

            const input = window.prompt('请输入访问密码');
            if (input === ACCESS_PASSWORD) {
                sessionStorage.setItem(AUTH_KEY, '1');
                return;
            }

            document.body.innerHTML = '<div style="height:100vh;display:flex;align-items:center;justify-content:center;background:#111;color:#fff;font-family:Microsoft YaHei,sans-serif;font-size:20px;">访问被拒绝：密码错误</div>';
            throw new Error('Access denied');
        })();
    </script>
    <div id="app">
        <div class="layout-container">
            <div class="map-header">
                <div class="header-left">
                    <span style="font-weight: bold; font-size: 16px;">🏭 Minecraft 自动仓库地图</span>
                    <span class="container-count">共 {{ totalContainers }} 个容器</span>
                </div>
                <div class="header-right">
                    <button class="refresh-btn" @click="fetchContainerMap">
                        {{ mapLoading ? '加载中...' : '🔄 刷新' }}
                    </button>
                </div>
            </div>

            <div class="map-content" v-if="!mapError">
                <div class="map-section">
                    <div class="section-title">靠近门的一侧（Z 值较小）</div>
                    <div class="map-canvas" @mousemove="onMouseMove" @mouseleave="hideTooltip">
                        <div v-for="item in leftContainers"
                             :key="`L-${item.container_x},${item.container_y},${item.container_z}`"
                             class="container-item"
                             :style="getLeftStyle(item)"
                             @mouseenter="(e) => showTooltip(item, e)"
                             @mouseleave="hideTooltip">
                            <img class="item-icon"
                                 :src="getIcon(item.item_id)"
                                 @error="(e) => handleIconError(e, item.item_id)"
                                 :alt="item.item_name_zh"
                                 :title="`${item.item_name_zh} x${item.count}`"/>
                        </div>
                        <div v-if="leftContainers.length === 0" class="empty-message">
                            暂无数据
                        </div>
                    </div>
                </div>

                <div class="map-section">
                    <div class="section-title">靠近深处的一侧（Z 值较大）</div>
                    <div class="map-canvas" @mousemove="onMouseMove" @mouseleave="hideTooltip">
                        <div v-for="item in rightContainers"
                             :key="`R-${item.container_x},${item.container_y},${item.container_z}`"
                             class="container-item"
                             :style="getRightStyle(item)"
                             @mouseenter="(e) => showTooltip(item, e)"
                             @mouseleave="hideTooltip">
                            <img class="item-icon"
                                 :src="getIcon(item.item_id)"
                                 @error="(e) => handleIconError(e, item.item_id)"
                                 :alt="item.item_name_zh"
                                 :title="`${item.item_name_zh} x${item.count}`"/>
                        </div>
                        <div v-if="rightContainers.length === 0" class="empty-message">
                            暂无数据
                        </div>
                    </div>
                </div>
            </div>

            <div v-else style="padding: 20px; color: #f56c6c;">
                {{ mapError }}
            </div>

            <div class="tooltip-box" :class="{ show: tooltip.show }" :style="{ left: tooltip.x + 'px', top: tooltip.y + 'px' }">
                <div>{{ tooltip.name }}</div>
                <div style="color: #999;">{{ tooltip.id }}</div>
                <div style="color: #67C23A;">📍 ({{ tooltip.x_coord }}, {{ tooltip.y_coord }}, {{ tooltip.z_coord }})</div>
                <div style="color: #E6A23C;">📦 x{{ tooltip.count }}</div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        const socket = io();

        const app = createApp({
            data() {
                return {
                    mapContainers: [],
                    mapLoading: false,
                    mapError: null,
                    minX: 0, maxX: 0,
                    minY: 0, maxY: 0,
                    minZ: 0, maxZ: 0,
                    midZ: 0,
                    tooltip: {
                        show: false,
                        x: 0,
                        y: 0,
                        name: '',
                        id: '',
                        x_coord: 0,
                        y_coord: 0,
                        z_coord: 0,
                        count: 0
                    }
                };
            },
            computed: {
                leftContainers() {
                    return this.mapContainers.filter(c => c.container_z < this.midZ);
                },
                rightContainers() {
                    return this.mapContainers.filter(c => c.container_z >= this.midZ);
                },
                totalContainers() {
                    return this.mapContainers.length;
                }
            },
            mounted() {
                this.fetchContainerMap();
                // 监听窗口大小变化
                this.resizeHandler = () => {
                    this.$forceUpdate();
                };
                window.addEventListener('resize', this.resizeHandler);
                
                // 使用 ResizeObserver 监听容器变化
                this.observeContainerResize();
            },
            
            beforeUnmount() {
                window.removeEventListener('resize', this.resizeHandler);
            },
            
            methods: {
                observeContainerResize() {
                    const canvases = document.querySelectorAll('.map-canvas');
                    if (canvases.length > 0 && 'ResizeObserver' in window) {
                        const observer = new ResizeObserver(() => {
                            this.$forceUpdate();
                        });
                        canvases.forEach(canvas => observer.observe(canvas));
                    }
                },

                async fetchContainerMap() {
                    this.mapLoading = true;
                    this.mapError = null;
                    try {
                        const response = await fetch('/api/container-map');
                        console.log('API响应状态:', response.status);
                        const data = await response.json();
                        console.log('API返回数据:', data);
                        if (data.success) {
                            this.mapContainers = data.containers;
                            console.log('加载了', data.containers.length, '个容器');
                            this.calculateBounds();
                            // 数据加载完成后，等待 DOM 更新再观察大小变化
                            this.$nextTick(() => {
                                this.observeContainerResize();
                            });
                        } else {
                            this.mapError = '数据加载失败: ' + (data.error || '未知错误');
                        }
                    } catch (err) {
                        console.error('连接错误:', err);
                        this.mapError = '连接失败: ' + err.message;
                    } finally {
                        this.mapLoading = false;
                    }
                },

                calculateBounds() {
                    if (this.mapContainers.length === 0) return;

                    let minX = Number.MAX_SAFE_INTEGER, maxX = Number.MIN_SAFE_INTEGER;
                    let minY = Number.MAX_SAFE_INTEGER, maxY = Number.MIN_SAFE_INTEGER;
                    let minZ = Number.MAX_SAFE_INTEGER, maxZ = Number.MIN_SAFE_INTEGER;

                    this.mapContainers.forEach(item => {
                        minX = Math.min(minX, item.container_x);
                        maxX = Math.max(maxX, item.container_x);
                        minY = Math.min(minY, item.container_y);
                        maxY = Math.max(maxY, item.container_y);
                        minZ = Math.min(minZ, item.container_z);
                        maxZ = Math.max(maxZ, item.container_z);
                    });

                    this.minX = isFinite(minX) ? minX : 0;
                    this.maxX = isFinite(maxX) ? maxX : 10;
                    this.minY = isFinite(minY) ? minY : 0;
                    this.maxY = isFinite(maxY) ? maxY : 10;
                    this.minZ = isFinite(minZ) ? minZ : 0;
                    this.maxZ = isFinite(maxZ) ? maxZ : 10;
                    this.midZ = (this.minZ + this.maxZ) / 2;
                },

                getLeftStyle(item) {
                    return this._getItemStyle(item, this.leftContainers);
                },

                getRightStyle(item) {
                    return this._getItemStyle(item, this.rightContainers);
                },

                _getItemStyle(item, containers) {
                    if (containers.length === 0) return { display: 'none' };

                    // 获取所有 map-canvas 的尺寸
                    const canvases = document.querySelectorAll('.map-canvas');
                    let containerW = 800, containerH = 600;
                    
                    if (canvases.length > 0) {
                        const rect = canvases[0].getBoundingClientRect();
                        containerW = Math.max(rect.width || 800, 300);
                        containerH = Math.max(rect.height || 600, 300);
                    }
                    
                    // 获取该侧容器的坐标范围
                    let sideMinX = Number.MAX_SAFE_INTEGER, sideMaxX = Number.MIN_SAFE_INTEGER;
                    let sideMinY = Number.MAX_SAFE_INTEGER, sideMaxY = Number.MIN_SAFE_INTEGER;

                    containers.forEach(c => {
                        sideMinX = Math.min(sideMinX, c.container_x);
                        sideMaxX = Math.max(sideMaxX, c.container_x);
                        sideMinY = Math.min(sideMinY, c.container_y);
                        sideMaxY = Math.max(sideMaxY, c.container_y);
                    });

                    const xRange = Math.max(sideMaxX - sideMinX, 1);
                    const yRange = Math.max(sideMaxY - sideMinY, 1);

                    // 计算可用空间（留出10%边距）
                    const margin = Math.min(containerW, containerH) * 0.08;
                    const usableW = containerW - 2 * margin;
                    const usableH = containerH - 2 * margin;

                    // 计算缩放因子，使得所有容器都能显示
                    const itemSize = 40;
                    const scaleX = usableW / (xRange + 1);  // +1 为容器本身留空间
                    const scaleY = usableH / (yRange + 1);
                    const scale = Math.min(scaleX, scaleY);

                    // 计算相对位置（已通过坐标差值乘以缩放因子）
                    const x = margin + (item.container_x - sideMinX) * scale + (scale - itemSize) / 2;
                    const y = margin + (item.container_y - sideMinY) * scale + (scale - itemSize) / 2;

                    // 确保不超过边界
                    const finalX = Math.max(margin, Math.min(x, containerW - margin - itemSize));
                    const finalY = Math.max(margin, Math.min(y, containerH - margin - itemSize));

                    // Y高度影响透明度和颜色
                    const yNorm = this.maxY > this.minY ? (item.container_y - this.minY) / (this.maxY - this.minY) : 0;
                    const opacity = 0.4 + yNorm * 0.6;
                    const hue = yNorm * 60;

                    return {
                        left: `${finalX}px`,
                        top: `${finalY}px`,
                        opacity: opacity,
                        filter: `hue-rotate(${hue}deg) brightness(1)`,
                        zIndex: Math.floor(item.container_y),
                        boxShadow: `0 0 ${Math.floor(2 + yNorm * 6)}px rgba(64, 158, 255, ${0.2 + yNorm * 0.3})`
                    };
                },

                getIcon(id) {
                    const shortId = id.replace('minecraft:', '');
                    return `/items/${shortId}.png`;
                },

                handleIconError(e, id) {
                    const shortId = id.replace('minecraft:', '');
                    const suffixes = ['/blocks/', '/blocks_front.png', '/blocks_top.png', '/blocks_side.png'];
                    
                    let nextSrc = suffixes.find(s => !e.target.src.includes(s));
                    if (nextSrc) {
                        e.target.src = nextSrc.startsWith('/') ? 
                            `/blocks/${shortId}${nextSrc}` : nextSrc + shortId + '.png';
                    } else {
                        e.target.src = '/items/barrier.png';
                    }
                },

                showTooltip(item, event) {
                    this.tooltip = {
                        show: true,
                        x: event.clientX + 10,
                        y: event.clientY + 10,
                        name: item.item_name_zh,
                        id: item.item_id,
                        x_coord: item.container_x,
                        y_coord: item.container_y,
                        z_coord: item.container_z,
                        count: item.count
                    };
                },

                hideTooltip() {
                    this.tooltip.show = false;
                },

                onMouseMove(event) {
                    if (this.tooltip.show) {
                        this.tooltip.x = event.clientX + 10;
                        this.tooltip.y = event.clientY + 10;
                    }
                }
            }
        });

        app.mount('#app');
    </script>
</body>
</html>
